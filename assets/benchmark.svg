<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12141f"/><stop offset="1" stop-color="#0d0f16"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="880" height="440" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="879" height="439" rx="16" fill="none" stroke="#252a3d"/>

  <!-- title -->
  <text x="36" y="46" fill="#8b9dff" font-size="13" letter-spacing="2">COST × RELIABILITY</text>
  <text x="36" y="76" fill="#e8eaf4" font-size="23" font-weight="700">同等可靠，成本仅 1/7</text>
  <text x="36" y="100" fill="#8b90a8" font-size="13" font-family="system-ui,-apple-system,sans-serif">防污染自建场景 × 4 模型 × 3 seed 的 pass^3</text>

  <!-- plot frame: x 60..600 (log ¥ 0.1..10), y 140..380 (rel 3.5..5) -->
  <g>
    <!-- sweet spot -->
    <rect x="80" y="140" width="150" height="70" rx="8" fill="#1c2140"/>
    <text x="90" y="160" fill="#8b9dff" font-size="11">甜区</text>
    <text x="90" y="176" fill="#5b617a" font-size="10">高可靠·低成本</text>
    <!-- axes -->
    <line x1="80" y1="380" x2="620" y2="380" stroke="#252a3d" stroke-width="1.5"/>
    <line x1="80" y1="140" x2="80" y2="380" stroke="#252a3d" stroke-width="1.5"/>
    <!-- x grid: ¥0.1@80 ¥1@350 ¥10@620 -->
    <line x1="215" y1="140" x2="215" y2="380" stroke="#1d2233" stroke-dasharray="3 5"/>
    <line x1="350" y1="140" x2="350" y2="380" stroke="#1d2233" stroke-dasharray="3 5"/>
    <line x1="485" y1="140" x2="485" y2="380" stroke="#1d2233" stroke-dasharray="3 5"/>
    <text x="80" y="398" fill="#5b617a" font-size="11" text-anchor="middle">¥0.1</text>
    <text x="350" y="398" fill="#5b617a" font-size="11" text-anchor="middle">¥1</text>
    <text x="620" y="398" fill="#5b617a" font-size="11" text-anchor="middle">¥10</text>
    <text x="350" y="420" fill="#8b90a8" font-size="11" text-anchor="middle">总花费（对数轴，越左越便宜 →）</text>
    <!-- y labels rel 5@140 4@280 3.5@380 -->
    <text x="72" y="144" fill="#5b617a" font-size="11" text-anchor="end">5/5</text>
    <text x="72" y="284" fill="#5b617a" font-size="11" text-anchor="end">4/5</text>
    <text x="52" y="264" fill="#8b90a8" font-size="11" text-anchor="middle" transform="rotate(-90 52 264)">可靠场景 pass^3 ↑</text>

    <!-- tie line pro->glm52 -->
    <line x1="315" y1="162" x2="565" y2="162" stroke="#8b9dff" stroke-width="1.2" stroke-dasharray="4 4" opacity=".5"/>
    <text x="440" y="154" fill="#8b9dff" font-size="11" text-anchor="middle">同样 5/5，便宜 7×</text>

    <!-- points  x=80+(log10(c)+1)/2*540 ; y=140+(1-(rel-3.5)/1.5)*240 -->
    <!-- flash 0.24/4 -> x=185 y=280 -->
    <circle cx="185" cy="280" r="8" fill="#141724" stroke="#8b9dff" stroke-width="2"/>
    <text x="185" y="304" fill="#e8eaf4" font-size="11.5" text-anchor="middle">flash</text>
    <text x="185" y="318" fill="#5b617a" font-size="10" text-anchor="middle">¥0.24</text>
    <!-- glm-turbo 0.35/4 -> x=229 y=280 -->
    <circle cx="229" cy="252" r="8" fill="#141724" stroke="#8b90a8" stroke-width="2"/>
    <text x="255" y="248" fill="#e8eaf4" font-size="11.5" text-anchor="middle">glm-turbo</text>
    <text x="255" y="262" fill="#5b617a" font-size="10" text-anchor="middle">¥0.35</text>
    <!-- pro 0.68/5 -> x=325 y=140+... = 140 -->
    <circle cx="325" cy="162" r="12" fill="#8b9dff"/>
    <text x="325" y="132" fill="#8b9dff" font-size="13" font-weight="700" text-anchor="middle">deepseek-v4-pro</text>
    <text x="325" y="188" fill="#8b9dff" font-size="10.5" text-anchor="middle">¥0.68 · 默认</text>
    <!-- glm52 4.83/5 -> x=565 y=162 -->
    <circle cx="565" cy="162" r="8" fill="#141724" stroke="#8b90a8" stroke-width="2"/>
    <text x="565" y="188" fill="#e8eaf4" font-size="11.5" text-anchor="middle">glm-5.2</text>
    <text x="565" y="202" fill="#5b617a" font-size="10" text-anchor="middle">¥4.83</text>
  </g>

  <!-- side scoreboard -->
  <g transform="translate(660,140)">
    <text x="0" y="0" fill="#8b90a8" font-size="12" font-family="system-ui,sans-serif">可靠场景 / 总花费</text>
    <g font-size="13">
      <rect x="0" y="16" width="188" height="34" rx="7" fill="#1c2140"/>
      <text x="12" y="38" fill="#8b9dff" font-weight="700">deepseek-v4-pro</text>
      <text x="176" y="38" fill="#8b9dff" text-anchor="end">5/5 · ¥.68</text>

      <text x="12" y="76" fill="#e8eaf4">deepseek-flash</text>
      <text x="176" y="76" fill="#8b90a8" text-anchor="end">4/5 · ¥.24</text>
      <text x="12" y="104" fill="#e8eaf4">glm-5-turbo</text>
      <text x="176" y="104" fill="#8b90a8" text-anchor="end">4/5 · ¥.35</text>
      <text x="12" y="132" fill="#e8eaf4">glm-5.2</text>
      <text x="176" y="132" fill="#8b90a8" text-anchor="end">5/5 · ¥4.83</text>
    </g>
    <line x1="0" y1="152" x2="188" y2="152" stroke="#252a3d"/>
    <text x="0" y="180" fill="#3ed592" font-size="12" font-family="system-ui,sans-serif">vs Claude · 4 类真实任务全部打平</text>
    <text x="0" y="204" fill="#5b617a" font-size="11" font-family="system-ui,sans-serif">Office·研究·数据分析·复杂编程</text>
  </g>
</svg>
