<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 220" font-family="ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1220"/><stop offset=".55" stop-color="#0d0f16"/><stop offset="1" stop-color="#12162a"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="42%" r="55%">
      <stop offset="0" stop-color="#8b9dff" stop-opacity=".18"/><stop offset="1" stop-color="#8b9dff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="880" height="220" rx="18" fill="url(#hbg)"/>
  <rect width="880" height="220" rx="18" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="879" height="219" rx="18" fill="none" stroke="#242a40"/>

  <!-- logo mark: cursor + spark -->
  <g transform="translate(96,110)">
    <text x="-2" y="24" fill="#8b9dff" font-size="62" font-weight="700">❯</text>
    <rect x="44" y="-24" width="15" height="50" rx="2" fill="#8b9dff"/>
    <text x="70" y="-30" fill="#8b9dff" font-size="30">✦</text>
  </g>

  <!-- wordmark -->
  <text x="210" y="98" fill="#f0f2fb" font-size="52" font-weight="700" letter-spacing="-1">deepcode</text>
  <text x="212" y="132" fill="#8b90a8" font-size="16" font-family="system-ui,-apple-system,sans-serif">终端编码 agent · 直连 DeepSeek / GLM / Kimi</text>

  <!-- chips -->
  <g font-size="13" fill="#c7cdf0">
    <rect x="212" y="152" width="150" height="30" rx="15" fill="#171a2b" stroke="#2a3050"/>
    <text x="228" y="172">多 provider</text>
    <rect x="372" y="152" width="130" height="30" rx="15" fill="#171a2b" stroke="#2a3050"/>
    <text x="388" y="172">自带记忆</text>
    <rect x="512" y="152" width="216" height="30" rx="15" fill="#171a2b" stroke="#3a4170"/>
    <text x="528" y="172" fill="#8b9dff" font-weight="700">追平 Claude · 成本 1/7</text>
  </g>
</svg>
